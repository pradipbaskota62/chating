<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Messenger Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

<div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 p-4">
    <div class="w-full max-w-sm p-8 glass rounded-[2.5rem] text-center shadow-2xl">
        <h1 class="text-3xl font-black mb-6 tracking-tighter">NEXUS MESSENGER</h1>
        <div class="space-y-4">
            <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white text-slate-900 p-4 rounded-2xl font-bold active:scale-95 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Google Login
            </button>
            <input type="text" id="nickname-input" placeholder="Your Nickname" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl outline-none text-center focus:border-blue-500">
            <button onclick="loginAnon()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold active:scale-95 transition">Enter Nexus</button>
        </div>
    </div>
</div>

<div id="user-list-screen" class="flex flex-col h-full w-full bg-slate-950">
    <div class="p-6 flex justify-between items-center border-b border-white/5">
        <h1 class="text-2xl font-black">Chats</h1>
        <div class="flex gap-3">
            <button onclick="toggleRequests()" class="p-2 bg-slate-800 rounded-xl text-xs font-bold">Requests</button>
            <button onclick="logout()" class="p-2 bg-red-500/10 text-red-500 rounded-xl text-xs font-bold">Logout</button>
        </div>
    </div>
    <div id="user-list" class="flex-1 overflow-y-auto p-4 space-y-2">
        <p class="text-center text-slate-500 text-xs mt-10">Searching for new people...</p>
    </div>
</div>

<div id="chat-screen" class="hidden fixed inset-0 z-50 flex flex-col bg-slate-950">
    <div class="p-4 flex items-center justify-between border-b border-white/5 glass">
        <div class="flex items-center gap-3">
            <button onclick="closeChat()" class="p-2 hover:bg-slate-800 rounded-xl">
                <svg width="24" height="24" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div id="chat-user-img" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">?</div>
            <div>
                <p id="chat-user-name" class="font-bold text-sm">User Name</p>
                <p class="text-[10px] text-emerald-400 font-bold uppercase">Active Now</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="alert('No Internet Connection')" class="p-2 bg-slate-800 rounded-xl">
                <svg width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
            </button>
            <button onclick="alert('No Internet Connection')" class="p-2 bg-slate-800 rounded-xl">
                <svg width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            </button>
        </div>
    </div>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

    <div class="p-4 glass border-t border-white/5">
        <div class="flex items-center gap-2">
            <label class="p-3 bg-slate-800 rounded-2xl cursor-pointer hover:bg-slate-700 transition">
                <input type="file" id="file-input" class="hidden" onchange="uploadFile(this)">
                <svg width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
            </label>
            <input type="text" id="msg-input" placeholder="Type a message..." class="flex-1 p-4 bg-slate-900 border border-slate-800 rounded-2xl outline-none text-sm">
            <button onclick="sendPrivateMsg()" class="p-4 bg-blue-600 rounded-2xl shadow-lg active:scale-90 transition">
                <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, onChildAdded, set, onValue, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwIMw7wuHVRdBtIhT1zCgh5bDLdslVpZw",
        authDomain: "chatingg-b948f.firebaseapp.com",
        databaseURL: "https://chatingg-b948f-default-rtdb.firebaseio.com",
        projectId: "chatingg-b948f",
        storageBucket: "chatingg-b948f.appspot.com",
        messagingSenderId: "676265332731",
        appId: "1:676265332731:web:90468c1d0158026abfc55e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    let currentChatId = null;
    let selectedUid = null;

    // --- Auth Logic ---
    window.loginWithGoogle = () => signInWithPopup(auth, provider).catch(alert);
    window.loginAnon = async () => {
        const name = document.getElementById('nickname-input').value;
        if(!name) return alert("Nickname required!");
        const res = await signInAnonymously(auth);
        await updateProfile(res.user, { displayName: name });
        window.location.reload();
    };
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            set(ref(db, 'users/' + user.uid), { uid: user.uid, name: user.displayName, status: "online" });
            loadUsers();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    // --- Friend Request System ---
    window.sendRequest = (uid) => {
        set(ref(db, `requests/${uid}/${auth.currentUser.uid}`), { from: auth.currentUser.uid, name: auth.currentUser.displayName, status: "pending" });
        alert("Request Sent!");
    };

    // --- Load Users (User List Screen) ---
    function loadUsers() {
        const list = document.getElementById('user-list');
        onValue(ref(db, 'users'), (snap) => {
            list.innerHTML = "";
            snap.forEach((child) => {
                const u = child.val();
                if(u.uid === auth.currentUser.uid) return;
                const div = document.createElement('div');
                div.className = "p-4 glass rounded-2xl flex justify-between items-center mb-2 active:scale-[0.98] transition";
                div.innerHTML = `
                    <div class="flex items-center gap-3" onclick="openChat('${u.uid}', '${u.name}')">
                        <div class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center font-bold text-blue-400 border border-white/5">${u.name.charAt(0)}</div>
                        <div class="flex-1">
                            <p class="font-bold text-sm">${u.name}</p>
                            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Active Chat</p>
                        </div>
                    </div>
                    <button onclick="sendRequest('${u.uid}')" class="p-2 bg-blue-600/20 text-blue-400 text-[10px] font-black rounded-lg">ADD</button>
                `;
                list.appendChild(div);
            });
        });
    }

    // --- Chat System ---
    window.openChat = (uid, name) => {
        selectedUid = uid;
        document.getElementById('chat-user-name').innerText = name;
        document.getElementById('chat-user-img').innerText = name.charAt(0);
        document.getElementById('chat-screen').classList.remove('hidden');
        currentChatId = auth.currentUser.uid < uid ? auth.currentUser.uid + "_" + uid : uid + "_" + auth.currentUser.uid;
        loadMessages();
    };

    window.closeChat = () => {
        document.getElementById('chat-screen').classList.add('hidden');
    };

    window.sendPrivateMsg = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim() || !currentChatId) return;
        const msgKey = push(ref(db, 'private_messages/' + currentChatId)).key;
        set(ref(db, `private_messages/${currentChatId}/${msgKey}`), {
            id: msgKey,
            sender: auth.currentUser.uid,
            content: input.value,
            type: "text",
            status: "sent",
            time: serverTimestamp()
        });
        input.value = "";
    };

    window.uploadFile = async (el) => {
        const file = el.files[0];
        if(!file) return;
        const fRef = sRef(storage, 'uploads/' + Date.now() + file.name);
        alert("Sending file...");
        await uploadBytes(fRef, file);
        const url = await getDownloadURL(fRef);
        push(ref(db, 'private_messages/' + currentChatId), {
            sender: auth.currentUser.uid,
            content: url,
            type: "file",
            status: "sent",
            time: serverTimestamp()
        });
    };

    function loadMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        onChildAdded(ref(db, 'private_messages/' + currentChatId), (snap) => {
            const m = snap.val();
            const isMe = m.sender === auth.currentUser.uid;
            
            // Mark as seen if it's from the other person
            if(!isMe && m.status !== "seen") {
                update(ref(db, `private_messages/${currentChatId}/${m.id}`), { status: "seen" });
            }

            const div = document.createElement('div');
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            let contentHtml = m.type === "file" ? `<img src="${m.content}" class="max-w-xs rounded-xl shadow-lg">` : `<p class="text-sm leading-relaxed">${m.content}</p>`;
            
            div.innerHTML = `
                <div class="max-w-[80%] flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    <div class="p-3 rounded-2xl ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-800 text-slate-200 rounded-tl-none'} shadow-xl">
                        ${contentHtml}
                    </div>
                    ${isMe ? `<span class="text-[8px] mt-1 font-bold text-slate-500 uppercase">${m.status}</span>` : ''}
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
