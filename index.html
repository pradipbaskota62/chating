<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chat | Real AI & Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #chat-box { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="p-2 sm:p-4">

<div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950">
    <div class="w-full max-w-sm p-8 glass rounded-[2.5rem] text-center shadow-2xl">
        <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-cyan-400 rounded-3xl mx-auto flex items-center justify-center mb-6 shadow-xl rotate-12">
            <span class="text-4xl font-black -rotate-12">N</span>
        </div>
        <h1 class="text-3xl font-black mb-1">NEXUS PRO</h1>
        <p class="text-slate-500 text-[10px] font-bold tracking-[0.2em] mb-8 uppercase">Real AI Integrated</p>
        <div class="space-y-4">
            <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white text-slate-900 p-4 rounded-2xl font-bold active:scale-95 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Sign in with Google
            </button>
            <input type="text" id="nickname-input" placeholder="Your Nickname" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl outline-none text-center">
            <button onclick="loginAnon()" class="w-full bg-slate-800 p-4 rounded-2xl font-bold active:scale-95 transition">Enter Room</button>
        </div>
    </div>
</div>

<div id="chat-app" class="hidden flex flex-col h-full w-full max-w-2xl mx-auto glass rounded-[2.5rem] overflow-hidden shadow-2xl">
    <div class="p-5 border-b border-white/5 flex justify-between items-center bg-slate-900/40">
        <div class="flex items-center gap-3">
            <div id="user-img" class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center font-bold">?</div>
            <div>
                <p id="display-name" class="font-bold text-sm">User</p>
                <p class="text-[10px] text-emerald-400 font-bold uppercase">● Online</p>
            </div>
        </div>
        <button onclick="logout()" class="p-2 bg-red-500/10 text-red-500 rounded-lg text-[10px] font-black uppercase">Exit</button>
    </div>

    <div id="chat-box"></div>

    <div class="p-4 bg-slate-900/60 border-t border-white/5">
        <div class="flex gap-2 items-center">
            <input type="text" id="msg-input" placeholder="Ask AI anything with @ai..." class="flex-1 p-4 bg-slate-800 rounded-2xl outline-none text-sm border border-transparent focus:border-blue-500/50">
            <button onclick="handleSend()" class="bg-blue-600 p-4 rounded-2xl shadow-xl active:scale-90 transition">
                <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwIMw7wuHVRdBtIhT1zCgh5bDLdslVpZw",
        authDomain: "chatingg-b948f.firebaseapp.com",
        databaseURL: "https://chatingg-b948f-default-rtdb.firebaseio.com",
        projectId: "chatingg-b948f",
        storageBucket: "chatingg-b948f.appspot.com",
        messagingSenderId: "676265332731",
        appId: "1:676265332731:web:90468c1d0158026abfc55e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // AI logic (Real Smart Response)
    async function askRealAI(question) {
        try {
            // यो एउ4ा फ्री AI API हो, तपाईँ पछि आफ्नो Gemini API Key हाल्न सक्नुहुन्छ
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://text-to-api-example.com/ai?q=${question}`)}`); 
            // अहिलेका लागि म यहाँ एउटा रेस्पोन्स सिमुलेट गर्दैछु
            return "🤖 Nexus AI: म तपाईँको प्रश्न '"+question+"' बुझ्दैछु। म अझै सिक्दैछु, तर प्रदीपले मलाई छिट्टै धेरै कुरा सिकाउनुहुनेछ!";
        } catch(e) { return "🤖 AI अहिले व्यस्त छ, पछि प्रयास गर्नुहोस्।"; }
    }

    window.loginWithGoogle = () => signInWithPopup(auth, provider).catch(alert);
    window.loginAnon = async () => {
        const name = document.getElementById('nickname-input').value;
        if(!name) return alert("Enter nickname!");
        const res = await signInAnonymously(auth);
        await updateProfile(res.user, { displayName: name });
        window.location.reload();
    };
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('chat-app').classList.remove('hidden');
            document.getElementById('display-name').innerText = user.displayName || "Nexus User";
            document.getElementById('user-img').innerText = (user.displayName || "N").charAt(0);
            loadMessages();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('chat-app').classList.add('hidden');
        }
    });

    window.handleSend = async () => {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;

        sendMessage(text, auth.currentUser.uid, auth.currentUser.displayName);
        input.value = "";

        if(text.toLowerCase().startsWith('@ai')) {
            const aiReply = await askRealAI(text.replace('@ai', ''));
            setTimeout(() => sendMessage(aiReply, "ai-bot", "Nexus AI"), 1000);
        }
    };

    function sendMessage(content, uid, name) {
        push(ref(db, 'messages'), { uid, name, content, time: serverTimestamp() });
    }

    function loadMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        onChildAdded(ref(db, 'messages'), (d) => {
            const m = d.val();
            const isMe = m.uid === auth.currentUser?.uid;
            const div = document.createElement('div');
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="max-w-[85%]">
                    <p class="text-[9px] font-bold text-slate-500 mb-1 px-2 ${isMe ? 'text-right' : ''}">${m.name}</p>
                    <div class="p-3 rounded-2xl ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-800 text-slate-200 rounded-tl-none'} shadow-lg">
                        <p class="text-sm">${m.content}</p>
                    </div>
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
