<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chat | Made in Nepal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; user-select: none; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .selectable { user-select: text !important; }
        #toast { visibility: hidden; min-width: 250px; background: #1e293b; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center">

<div id="toast">Notice</div>

<div id="global-loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center flex-col">
    <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 text-slate-400 font-bold tracking-widest uppercase text-[10px]">Nexus Chat Loading...</p>
</div>

<div id="auth-screen" class="hidden fixed inset-0 z-40 flex flex-col items-center justify-center p-6 bg-white">
    <div class="text-center mb-10">
        <div class="w-20 h-20 bg-blue-600 rounded-[2rem] mx-auto flex items-center justify-center shadow-2xl shadow-blue-200 rotate-12 mb-4">
            <span class="text-white text-4xl font-black -rotate-12">N</span>
        </div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter">NEXUS CHAT</h1>
        <p class="text-slate-400 text-[10px] font-bold tracking-[0.2em] uppercase mt-1">Made in ❤️ Nepal</p>
    </div>

    <div class="w-full max-w-sm space-y-3">
        <div id="signup-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 border-slate-200">
        </div>
        <input type="email" id="auth-email" placeholder="Email Address" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 border-slate-200">
        <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 border-slate-200">
        
        <button onclick="handleAuth()" id="main-auth-btn" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-blue-100 transition active:scale-95">Login</button>
        
        <div class="relative flex py-4 items-center">
            <div class="flex-grow border-t border-slate-200"></div>
            <span class="flex-shrink mx-4 text-slate-300 text-xs font-bold">OR</span>
            <div class="flex-grow border-t border-slate-200"></div>
        </div>

        <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 border border-slate-200 p-4 rounded-2xl bg-white transition active:scale-95 hover:bg-slate-50">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> 
            <span class="font-bold text-slate-700">Continue with Google</span>
        </button>

        <div class="flex justify-between px-2 pt-2 text-xs">
            <a href="javascript:void(0)" onclick="openForgotModal()" class="text-blue-500 font-bold">Forgot Password?</a>
            <a href="javascript:void(0)" onclick="toggleAuthMode()" id="toggle-link" class="text-slate-500 font-bold underline">Create Account</a>
        </div>
    </div>
</div>

<div id="forgot-modal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-sm rounded-3xl p-8 space-y-4">
        <h3 class="text-xl font-black text-slate-800">Reset Password</h3>
        <p class="text-sm text-slate-500">Enter your email and we'll send a real reset link.</p>
        <input type="email" id="reset-email-input" placeholder="Email Address" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
        <div class="flex gap-2">
            <button onclick="closeForgotModal()" class="flex-1 p-4 text-slate-400 font-bold">Cancel</button>
            <button onclick="processReset()" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold transition active:scale-95">Send Link</button>
        </div>
    </div>
</div>

<div id="chat-screen" class="hidden flex flex-col h-screen w-full max-w-md bg-white shadow-2xl relative">
    <div class="p-4 border-b bg-white flex items-center gap-2">
        <input type="text" id="searchUser" placeholder="Search User ID..." class="flex-1 bg-slate-100 p-2 rounded-xl text-xs outline-none focus:ring-1 focus:ring-blue-400">
        <button onclick="searchUser()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold">SEARCH</button>
    </div>

    <div class="p-4 border-b flex justify-between items-center bg-white">
        <div class="flex items-center gap-3">
            <div id="user-avatar" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold shadow-lg">?</div>
            <div>
                <span id="display-name" class="font-black text-slate-800 block text-sm leading-none mb-1">User</span>
                <span id="my-id" class="text-[9px] text-slate-400 font-bold">ID: ...</span>
            </div>
        </div>
        <button onclick="logout()" class="text-[10px] font-black text-red-500 border border-red-50 px-3 py-2 rounded-lg">LOGOUT</button>
    </div>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50"></div>

    <div class="p-4 bg-white border-t flex items-center gap-2">
        <label class="p-3 cursor-pointer bg-slate-100 rounded-2xl hover:bg-slate-200 transition">
            📎<input type="file" id="fileInput" class="hidden" onchange="uploadFile(this)">
        </label>
        <input type="text" id="messageInput" placeholder="Write a message..." class="flex-1 p-3 bg-slate-100 rounded-2xl outline-none text-sm selectable">
        <button onclick="sendMessage()" class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg shadow-blue-100 active:scale-90 transition">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<div id="msg-modal" class="fixed inset-0 bg-black/40 hidden z-50 flex items-end justify-center">
    <div class="bg-white w-full rounded-t-[2.5rem] p-8 space-y-3 shadow-2xl">
        <button id="del-me" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-slate-600">Delete for me</button>
        <button id="del-all" class="w-full p-4 bg-red-50 text-red-500 rounded-2xl font-bold">Delete for everyone</button>
        <button onclick="closeModal()" class="w-full p-4 text-slate-400 font-bold">Cancel</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, sendPasswordResetEmail, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwIMw7wuHVRdBtIhT1zCgh5bDLdslVpZw",
        authDomain: "chatingg-b948f.firebaseapp.com",
        databaseURL: "https://chatingg-b948f-default-rtdb.firebaseio.com",
        projectId: "chatingg-b948f",
        storageBucket: "chatingg-b948f.firebasestorage.app",
        messagingSenderId: "676265332731",
        appId: "1:676265332731:web:90468c1d0158026abfc55e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    let isLoginMode = true;
    let selectedMsgId = null;

    const showToast = (m) => { const t = document.getElementById("toast"); t.innerText = m; t.className = "show"; setTimeout(()=>t.className="", 3000); };
    const showLoader = (s) => document.getElementById('global-loader').style.display = s ? 'flex' : 'none';

    window.toggleAuthMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('signup-fields').classList.toggle('hidden', isLoginMode);
        document.getElementById('main-auth-btn').innerText = isLoginMode ? "Login" : "Register";
        document.getElementById('toggle-link').innerText = isLoginMode ? "Create Account" : "Back to Login";
    };

    window.openForgotModal = () => {
        document.getElementById('forgot-modal').classList.remove('hidden');
        const email = document.getElementById('auth-email').value;
        if(email) document.getElementById('reset-email-input').value = email;
    };

    window.closeForgotModal = () => document.getElementById('forgot-modal').classList.add('hidden');

    window.processReset = async () => {
        const email = document.getElementById('reset-email-input').value;
        if(!email) return showToast("Enter your email");
        showLoader(true);
        try {
            await sendPasswordResetEmail(auth, email);
            showToast("Success! Real reset link sent to your email.");
            closeForgotModal();
        } catch(e) { showToast(e.message); }
        showLoader(false);
    };

    window.handleAuth = async () => {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        if(!e || !p) return showToast("Fill all fields");
        showLoader(true);
        try {
            if (isLoginMode) await signInWithEmailAndPassword(auth, e, p);
            else {
                const n = document.getElementById('reg-name').value;
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await updateProfile(res.user, { displayName: n });
                await update(ref(db, `users/${res.user.uid}`), { name: n, email: e });
            }
        } catch (err) { showToast(err.message); }
        showLoader(false);
    };

    window.loginWithGoogle = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (u) => {
        showLoader(false);
        if (u) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = u.displayName || "Nexus User";
            document.getElementById('my-id').innerText = `ID: ${u.uid.substring(0,8)}`;
            document.getElementById('user-avatar').innerText = (u.displayName || "N").charAt(0).toUpperCase();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('chat-screen').classList.add('hidden');
        }
    });

    window.sendMessage = () => {
        const i = document.getElementById('messageInput');
        if (i.value.trim()) {
            push(ref(db, 'messages'), {
                uid: auth.currentUser.uid,
                name: auth.currentUser.displayName || "User",
                text: i.value,
                type: 'text',
                timestamp: Date.now()
            });
            i.value = "";
        }
    };

    window.uploadFile = async (input) => {
        const file = input.files[0];
        if (!file) return;
        showLoader(true);
        try {
            const fileRef = sRef(storage, `chats/${Date.now()}_${file.name}`);
            await uploadBytes(fileRef, file);
            const url = await getDownloadURL(fileRef);
            let type = file.type.includes('image') ? 'image' : (file.type.includes('video') ? 'video' : 'file');
            push(ref(db, 'messages'), {
                uid: auth.currentUser.uid,
                name: auth.currentUser.displayName || "User",
                fileUrl: url,
                fileName: file.name,
                type: type,
                timestamp: Date.now()
            });
        } catch (e) { showToast("Upload failed!"); }
        showLoader(false);
    };

    window.openMsgOptions = (id, uid) => {
        selectedMsgId = id;
        document.getElementById('msg-modal').classList.remove('hidden');
        document.getElementById('del-all').style.display = (uid === auth.currentUser.uid) ? 'block' : 'none';
        
        document.getElementById('del-me').onclick = () => { document.getElementById(`msg-${id}`).remove(); closeModal(); };
        document.getElementById('del-all').onclick = () => { remove(ref(db, `messages/${id}`)); closeModal(); };
    };

    window.closeModal = () => document.getElementById('msg-modal').classList.add('hidden');

    onChildAdded(ref(db, 'messages'), (d) => {
        const m = d.val();
        const isMe = m.uid === auth.currentUser?.uid;
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.id = `msg-${d.key}`;
        div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
        div.onclick = () => openMsgOptions(d.key, m.uid);

        let content = `<div class="p-3 rounded-2xl max-w-[85%] shadow-sm selectable ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white border text-slate-800 rounded-tl-none'}">`;
        if(!isMe) content += `<p class="text-[9px] font-black text-blue-500 uppercase mb-1">${m.name}</p>`;
        
        if (m.type === 'text') content += `<p class="text-sm leading-tight">${m.text}</p>`;
        else if (m.type === 'image') content += `<img src="${m.fileUrl}" class="rounded-lg max-h-60 w-full object-cover">`;
        else if (m.type === 'video') content += `<video src="${m.fileUrl}" controls class="rounded-lg max-h-60 w-full"></video>`;
        else content += `<a href="${m.fileUrl}" target="_blank" class="flex items-center gap-2 underline text-xs italic">📎 ${m.fileName}</a>`;
        
        content += `<p class="text-[8px] mt-1 opacity-50 text-right">${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p></div>`;
        
        div.innerHTML = content;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });

    onChildRemoved(ref(db, 'messages'), (d) => {
        const el = document.getElementById(`msg-${d.key}`);
        if(el) el.innerHTML = `<div class="text-[10px] italic text-slate-300 p-2">Message deleted</div>`;
    });

    window.searchUser = () => {
        const id = document.getElementById('searchUser').value;
        if(!id) return showToast("Enter an ID");
        showToast("Finding User ID: " + id);
    };

</script>
</body>
  </html>
