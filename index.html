<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Messenger Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

<div id="auth-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-950 p-4">
    <div class="w-full max-w-sm p-8 glass rounded-[2.5rem] text-center">
        <h1 class="text-3xl font-black mb-8 text-blue-500">NEXUS LOGIN</h1>
        <div class="space-y-4">
            <button onclick="loginWithGoogle()" class="w-full bg-white text-black p-4 rounded-2xl font-bold flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Google Login
            </button>
            <div class="text-slate-500 text-xs">OR</div>
            <input type="text" id="nickname-input" placeholder="Enter Nickname" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl outline-none text-center">
            <button onclick="loginAnon()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold">Enter Messenger</button>
        </div>
    </div>
</div>

<div id="main-app" class="hidden flex flex-col h-full">
    <div class="p-4 border-b border-white/5 flex justify-between items-center glass">
        <h2 class="font-bold">Nexus Messenger</h2>
        <button onclick="logout()" class="text-red-500 text-xs font-bold">LOGOUT</button>
    </div>

    <div id="user-list" class="flex-1 overflow-y-auto p-4 space-y-2">
        <p class="text-center text-slate-500 text-xs">Searching for users...</p>
    </div>

    <div class="h-20 border-t border-white/5 bg-slate-950 flex justify-around items-center">
        <button onclick="location.reload()">🌐 Public</button>
        <button onclick="alert('Profile Loading...')">👤 Profile</button>
    </div>
</div>

<div id="chat-ui" class="hidden fixed inset-0 z-[100] bg-slate-950 flex flex-col">
    <div class="p-4 flex items-center gap-3 border-b border-white/5 glass">
        <button onclick="closeChat()" class="p-2">⬅️</button>
        <div id="target-name" class="font-bold">Chat</div>
    </div>
    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
    <div class="p-4 bg-slate-900 flex gap-2">
        <input type="text" id="msg-input" placeholder="Type a message..." class="flex-1 p-4 bg-slate-800 rounded-2xl outline-none">
        <button onclick="sendMsg()" class="bg-blue-600 p-4 rounded-2xl">Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, onChildAdded, set, onValue, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // IMPORTANT: Use your correct Firebase Config here
    const firebaseConfig = {
        apiKey: "AIzaSyAwIMw7wuHVRdBtIhT1zCgh5bDLdslVpZw",
        authDomain: "chatingg-b948f.firebaseapp.com",
        databaseURL: "https://chatingg-b948f-default-rtdb.firebaseio.com",
        projectId: "chatingg-b948f",
        storageBucket: "chatingg-b948f.appspot.com",
        messagingSenderId: "676265332731",
        appId: "1:676265332731:web:90468c1d0158026abfc55e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let selectedUid = null;
    let chatId = null;

    // LOGIN LOGIC
    window.loginWithGoogle = () => signInWithPopup(auth, provider);
    window.loginAnon = async () => {
        const name = document.getElementById('nickname-input').value;
        if(!name) return alert("Enter name!");
        const res = await signInAnonymously(auth);
        await updateProfile(res.user, { displayName: name });
        location.reload();
    };
    window.logout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            set(ref(db, 'users/' + user.uid), { uid: user.uid, name: user.displayName, status: 'online' });
            loadUserList();
        }
    });

    // CHAT LOGIC
    function loadUserList() {
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                if(u.uid === auth.currentUser.uid) return;
                const div = document.createElement('div');
                div.className = "p-4 glass rounded-2xl flex items-center gap-3 cursor-pointer";
                div.onclick = () => openChat(u.uid, u.name);
                div.innerHTML = `<div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">${u.name.charAt(0)}</div><div><p class="font-bold">${u.name}</p></div>`;
                list.appendChild(div);
            });
        });
    }

    window.openChat = (uid, name) => {
        selectedUid = uid;
        document.getElementById('target-name').innerText = name;
        document.getElementById('chat-ui').classList.remove('hidden');
        chatId = auth.currentUser.uid < uid ? auth.currentUser.uid + "_" + uid : uid + "_" + auth.currentUser.uid;
        loadMessages();
    };

    window.closeChat = () => document.getElementById('chat-ui').classList.add('hidden');

    window.sendMsg = () => {
        const input = document.getElementById('msg-input');
        if(!input.value || !chatId) return;
        const mRef = push(ref(db, 'chats/' + chatId));
        set(mRef, { id: mRef.key, sender: auth.currentUser.uid, text: input.value, status: 'sent', time: serverTimestamp() });
        input.value = "";
    };

    function loadMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        onChildAdded(ref(db, 'chats/' + chatId), (snap) => {
            const m = snap.val();
            const isMe = m.sender === auth.currentUser.uid;
            
            // Mark as SEEN
            if(!isMe && m.status !== 'seen') {
                update(ref(db, `chats/${chatId}/${m.id}`), { status: 'seen' });
            }

            const div = document.createElement('div');
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="p-3 rounded-2xl max-w-[80%] ${isMe ? 'bg-blue-600' : 'bg-slate-800'}">
                <p class="text-sm">${m.text}</p>
                ${isMe ? `<span class="text-[8px] opacity-50 uppercase">${m.status}</span>` : ''}
            </div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
