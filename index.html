<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Messenger | Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .user-card:hover { background: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen p-2 gap-2">

<div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950 p-4">
    <div class="w-full max-w-sm p-8 glass rounded-[2.5rem] text-center">
        <h1 class="text-3xl font-black mb-8">NEXUS MESSENGER</h1>
        <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white text-slate-900 p-4 rounded-2xl font-bold mb-4">
            Login with Google
        </button>
        <input type="text" id="nickname-input" placeholder="Your Nickname" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl outline-none text-center mb-4">
        <button onclick="loginAnon()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold">Start Chatting</button>
    </div>
</div>

<div id="sidebar" class="hidden w-full md:w-80 glass rounded-[2rem] flex flex-col overflow-hidden">
    <div class="p-5 border-b border-white/5 flex justify-between items-center">
        <h2 class="font-black text-xl">Chats</h2>
        <button onclick="logout()" class="text-xs text-red-500 font-bold uppercase">Logout</button>
    </div>
    <div id="user-list" class="flex-1 overflow-y-auto p-2 space-y-1">
        <p class="text-center text-slate-500 text-xs mt-10">Searching for people...</p>
    </div>
</div>

<div id="main-chat" class="hidden flex-1 glass rounded-[2rem] flex flex-col overflow-hidden">
    <div id="chat-header" class="p-5 border-b border-white/5 flex items-center gap-3 bg-slate-900/40">
        <div id="target-img" class="w-10 h-10 bg-slate-700 rounded-xl flex items-center justify-center font-bold">?</div>
        <div>
            <p id="target-name" class="font-bold text-sm">Select a user to chat</p>
            <p id="target-status" class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Offline</p>
        </div>
    </div>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
        <p class="text-center text-slate-600 text-sm mt-20">👋 Hello! Select a friend to start a private conversation.</p>
    </div>

    <div id="input-area" class="hidden p-4 bg-slate-900/60 border-t border-white/5 flex gap-2">
        <input type="text" id="msg-input" placeholder="Write a private message..." class="flex-1 p-4 bg-slate-800 rounded-2xl outline-none text-sm border border-transparent focus:border-blue-500/50">
        <button onclick="sendPrivateMsg()" class="bg-blue-600 p-4 rounded-2xl shadow-xl active:scale-90 transition">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, onChildAdded, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwIMw7wuHVRdBtIhT1zCgh5bDLdslVpZw",
        authDomain: "chatingg-b948f.firebaseapp.com",
        databaseURL: "https://chatingg-b948f-default-rtdb.firebaseio.com",
        projectId: "chatingg-b948f",
        storageBucket: "chatingg-b948f.appspot.com",
        messagingSenderId: "676265332731",
        appId: "1:676265332731:web:90468c1d0158026abfc55e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentChatId = null; 
    let selectedUserId = null;

    // --- Auth ---
    window.loginWithGoogle = () => signInWithPopup(auth, provider).catch(alert);
    window.loginAnon = async () => {
        const name = document.getElementById('nickname-input').value;
        if(!name) return alert("Nickname required!");
        const res = await signInAnonymously(auth);
        await updateProfile(res.user, { displayName: name });
        window.location.reload();
    };
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-chat').classList.remove('hidden');
            
            // Save user to "Online Users" list
            set(ref(db, 'users/' + user.uid), {
                uid: user.uid,
                name: user.displayName || "Anonymous",
                status: "online"
            });
            loadUserList();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    // --- Load Users (Sidebar) ---
    function loadUserList() {
        const list = document.getElementById('user-list');
        onValue(ref(db, 'users'), (snapshot) => {
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const u = child.val();
                if(u.uid === auth.currentUser.uid) return;
                
                const div = document.createElement('div');
                div.className = "user-card p-4 rounded-2xl cursor-pointer flex items-center gap-3 transition mb-1";
                div.onclick = () => openChat(u.uid, u.name);
                div.innerHTML = `
                    <div class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center font-bold text-blue-400 border border-white/5">${u.name.charAt(0)}</div>
                    <div>
                        <p class="font-bold text-sm">${u.name}</p>
                        <p class="text-[9px] text-emerald-500 font-bold uppercase tracking-tighter">Click to Chat</p>
                    </div>
                `;
                list.appendChild(div);
            });
        });
    }

    // --- Open Private Chat ---
    window.openChat = (uid, name) => {
        selectedUserId = uid;
        document.getElementById('target-name').innerText = name;
        document.getElementById('target-status').innerText = "Active Chat";
        document.getElementById('target-img').innerText = name.charAt(0);
        document.getElementById('input-area').classList.remove('hidden');
        
        // Private Chat ID generate (Symmetry)
        currentChatId = auth.currentUser.uid < uid ? auth.currentUser.uid + "_" + uid : uid + "_" + auth.currentUser.uid;
        loadPrivateMessages();
    };

    window.sendPrivateMsg = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim() || !currentChatId) return;

        push(ref(db, 'private_messages/' + currentChatId), {
            sender: auth.currentUser.uid,
            name: auth.currentUser.displayName,
            content: input.value,
            time: serverTimestamp()
        });
        input.value = "";
    };

    function loadPrivateMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = ""; 
        onChildAdded(ref(db, 'private_messages/' + currentChatId), (snapshot) => {
            const m = snapshot.val();
            const isMe = m.sender === auth.currentUser.uid;
            const div = document.createElement('div');
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="max-w-[80%] p-3 rounded-2xl ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-800 text-slate-200 rounded-tl-none'}">
                    <p class="text-sm">${m.content}</p>
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
